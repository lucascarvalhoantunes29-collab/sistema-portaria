<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" type="image/jpeg" href="/static/img/logo.jpeg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gerar QR Code — Recanto da Figueira</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background-image: url("/static/img/fundo.jpg");
            background-size: cover; background-position: center;
            background-attachment: fixed; position: relative;
        }
        body::before { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.25); }
        .topbar {
            position: relative; z-index: 10;
            background: rgba(255,255,255,0.85); backdrop-filter: blur(16px);
            padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .topbar h5 { font-family: 'Lora', serif; color: #1f4d35; margin: 0; font-size: 1.1rem; }
        .btn-voltar {
            background: rgba(31,77,53,0.08); color: #1f4d35;
            border: 1px solid rgba(31,77,53,0.2); border-radius: 10px;
            padding: 6px 14px; font-size: 0.82rem; font-weight: 500;
            text-decoration: none; transition: 0.2s;
        }
        .btn-voltar:hover { background: #1f4d35; color: white; }
        .content { position: relative; z-index: 2; padding: 40px 20px; max-width: 500px; margin: 0 auto; }
        .card-qr {
            background: rgba(255,255,255,0.18); backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 18px;
            padding: 32px; text-align: center;
            animation: fadeUp 0.5s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .card-qr h4 { font-family: 'Lora', serif; color: white; margin-bottom: 24px; }
        .form-label { color: white; font-weight: 500; }
        .form-control { background: rgba(255,255,255,0.88); border: none; border-radius: 10px; padding: 10px 12px; }
        .form-control:focus { box-shadow: 0 0 0 3px rgba(116,198,157,0.35); background: white; }
        .btn-gerar {
            background: linear-gradient(135deg, #2d6a4f, #40916c);
            color: white; border: none; width: 100%; padding: 12px;
            border-radius: 10px; font-size: 1rem; font-weight: 600;
            margin-top: 8px; transition: 0.2s;
        }
        .btn-gerar:hover { background: #1f4d35; transform: translateY(-1px); }
        .qr-resultado {
            margin-top: 28px; padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .qr-resultado p { color: rgba(255,255,255,0.9); margin-bottom: 16px; }
        .qr-resultado img { border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
        .instrucao {
            margin-top: 16px; color: rgba(255,255,255,0.75);
            font-size: 0.85rem; line-height: 1.6;
        }
        @media (max-width: 768px) {
            body { background-image: url("/static/img/fundo_mobile.png"); background-attachment: scroll; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <h5>🌳 Gerar QR Code</h5>
        <a href="/morador/area" class="btn-voltar"><i class="bi bi-arrow-left"></i> Voltar</a>
    </div>
    <div class="content">
        <div class="card-qr">
            <h4>📱 Gerar QR Code para Visitante</h4>
            <form method="POST">
                <div class="mb-3 text-start">
                    <label class="form-label">Nome do visitante</label>
                    <input type="text" name="nome_visitante" class="form-control"
                           placeholder="Ex: João Silva" required>
                </div>
                <button type="submit" class="btn-gerar">Gerar QR Code</button>
            </form>

            {% if qr_base64 %}
            <div class="qr-resultado">
                <p>✅ QR Code gerado para <strong>{{ nome_visitante }}</strong>!</p>
                <img src="data:image/png;base64,{{ qr_base64 }}" width="220" alt="QR Code">
                <p class="instrucao">
                    📲 Mande esta imagem para seu visitante.<br>
                    Na portaria, o porteiro escaneia e o acesso é liberado automaticamente.<br>
                    <strong>Este QR Code é de uso único.</strong>
                </p>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
