<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" type="image/jpeg" href="/static/img/logo.jpeg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QR Inválido</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; min-height: 100vh; display: flex;
            justify-content: center; align-items: center;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #7f1d1d, #991b1b);
        }
        .card {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 20px;
            padding: 48px 40px; text-align: center; max-width: 380px;
            animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        @keyframes pop {
            from { opacity: 0; transform: scale(0.8); }
            to   { opacity: 1; transform: scale(1); }
        }
        .icone { font-size: 4rem; margin-bottom: 16px; }
        h3 { font-family: 'Lora', serif; color: white; margin-bottom: 8px; }
        p { color: rgba(255,255,255,0.8); }
    </style>
</head>
<body>
    <div class="card">
        <div class="icone">❌</div>
        <h3>QR Code Inválido</h3>
        <p>{{ motivo }}</p>
    </div>
</body>
</html>
