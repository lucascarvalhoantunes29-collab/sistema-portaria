<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" type="image/jpeg" href="/static/img/logo.jpeg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recanto da Figueira</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background-image: url("{{ url_for('static', filename='img/fundo.jpg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        @media (max-width: 768px) {
            body {
                background-image: url("/static/img/fundo_mobile.png");
                background-position: top center;
                padding: 16px;
            }
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .tabs {
            display: flex;
            gap: 3px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 8px;
            border: none;
            border-radius: 10px 10px 0 0;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .tab-btn.ativo {
            background: #1f4d35;
            color: #fff;
        }

        .tab-btn.inativo {
            background: rgba(31,77,53,0.55);
            color: rgba(255,255,255,0.7);
        }

        .tab-btn.inativo:hover {
            background: rgba(31,77,53,0.75);
            color: #fff;
        }

        .card-login {
            background: #1f4d35;
            border-radius: 0 0 16px 16px;
            padding: 28px 28px 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
        }

        .form-label {
            color: rgba(255,255,255,0.75);
            font-weight: 500;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        .form-control, .form-select {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 0.9rem;
            color: #fff;
            transition: 0.2s;
        }

        .form-control::placeholder { color: rgba(255,255,255,0.35); }

        .form-control:focus, .form-select:focus {
            background: rgba(255,255,255,0.18);
            border-color: #74c69d;
            box-shadow: 0 0 0 3px rgba(116,198,157,0.25);
            color: #fff;
            outline: none;
        }

        .form-select option {
            background: #1f4d35;
            color: #fff;
        }

        .btn-entrar {
            background: #74c69d;
            color: #1a2e23;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 700;
            margin-top: 6px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-entrar:hover {
            background: #52b788;
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(0,0,0,0.2);
        }

        .painel { display: none; }
        .painel.ativo { display: block; }

        .alert {
            font-size: 0.82rem;
            margin-bottom: 12px;
            border-radius: 8px;
            background: rgba(220,38,38,0.25);
            border: 1px solid rgba(220,38,38,0.4);
            color: #fca5a5;
            padding: 8px 12px;
        }

        .sucesso-badge {
            background: rgba(34,197,94,0.2);
            border: 1px solid rgba(34,197,94,0.35);
            color: #86efac;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.82rem;
            margin-bottom: 12px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
    </style>
</head>
<body>
<div class="login-box">

    <div class="tabs">
        <button class="tab-btn ativo" onclick="trocarAba('porteiro', this)">
            <i class="bi bi-shield-lock"></i> Porteiro
        </button>
        <button class="tab-btn inativo" onclick="trocarAba('morador', this)">
            <i class="bi bi-house-door"></i> Morador
        </button>
    </div>

    <div class="card-login">

        <!-- PORTEIRO -->
        <div class="painel ativo" id="painel-porteiro">
            {% if erro %}
            <div class="alert">{{ erro }}</div>
            {% endif %}
            <form method="POST">
                <input type="hidden" name="tipo" value="porteiro">
                <div class="mb-3">
                    <label class="form-label">Usuário</label>
                    <input type="text" name="usuario" class="form-control"
                           placeholder="Digite seu usuário"
                           autocomplete="username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" name="senha" class="form-control"
                           placeholder="Digite sua senha"
                           autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-entrar">
                    <i class="bi bi-box-arrow-in-right"></i> Entrar como Porteiro
                </button>
            </form>
        </div>

        <!-- MORADOR LOGIN -->
        <div class="painel" id="painel-morador">
            {% if erro_morador %}
            <div class="alert">{{ erro_morador }}</div>
            {% endif %}
            {% if cadastro_ok %}
            <div class="sucesso-badge">
                <i class="bi bi-check-circle"></i> Conta criada! Faça login abaixo.
            </div>
            {% endif %}
            <form method="POST">
                <input type="hidden" name="tipo" value="morador_login">
                <div class="mb-2">
                    <label class="form-label">Bloco</label>
                    <select name="bloco_id" id="blocoLogin" class="form-select" required>
                        <option value="">Selecione</option>
                        {% for b in blocos %}
                        <option value="{{ b[0] }}">{{ b[1] }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-2">
                    <label class="form-label">Apartamento</label>
                    <select name="apartamento_id" id="apLogin" class="form-select" required>
                        <option value="">Selecione</option>
                        {% for a in apartamentos %}
                        <option value="{{ a[0] }}" data-bloco="{{ a[2] }}">AP {{ a[1] }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" name="senha" class="form-control"
                           placeholder="Digite sua senha"
                           autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-entrar">
                    <i class="bi bi-box-arrow-in-right"></i> Entrar como Morador
                </button>
            </form>
        </div>

    </div>
</div>

<script>
function trocarAba(aba, btn) {
    document.querySelectorAll('.painel').forEach(p => p.classList.remove('ativo'));
    document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('ativo'); b.classList.add('inativo'); });
    document.getElementById('painel-' + aba).classList.add('ativo');
    btn.classList.remove('inativo');
    btn.classList.add('ativo');
}

function filtrarAps(blocoSelectId, apSelectId) {
    const blocoSel = document.getElementById(blocoSelectId);
    const apSel = document.getElementById(apSelectId);
    const opts = Array.from(apSel.options);
    blocoSel.addEventListener('change', function() {
        const nome = this.options[this.selectedIndex].text.trim();
        opts.forEach((opt, i) => {
            if (i === 0) return;
            opt.style.display = (!this.value || opt.dataset.bloco === nome) ? '' : 'none';
        });
        apSel.value = '';
    });
}

filtrarAps('blocoLogin', 'apLogin');

{% if erro %}
trocarAba('porteiro', document.querySelectorAll('.tab-btn')[0]);
{% elif erro_morador or cadastro_ok %}
trocarAba('morador', document.querySelectorAll('.tab-btn')[1]);
{% endif %}
</script>
</body>
</html>
