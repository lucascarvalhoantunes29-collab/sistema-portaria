{% extends 'base.html' %}
{% block conteudo %}
<h4 class="fw-bold mb-4" style="color: var(--verde-escuro)">
    <i class="bi bi-person-plus me-2"></i>Registrar Visita
</h4>
<div class="card">
    <div class="card-body p-4" style="max-width: 500px">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Nome do Visitante</label>
                <input type="text" name="nome" class="form-control" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Visitando qual morador?</label>
                <select name="morador_id" class="form-select" required>
                    <option value="">Selecione um morador</option>
                    {% for m in moradores %}
                    <option value="{{ m[0] }}">{{ m[1] }} — {{ m[3] }} / AP {{ m[2] }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-verde">Registrar</button>
                <a href="/visitantes" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
