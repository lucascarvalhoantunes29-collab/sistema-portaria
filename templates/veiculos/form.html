{% extends 'base.html' %}
{% block conteudo %}
<h4 class="fw-bold mb-4" style="color: var(--verde-escuro)">
    {{ 'Editar' if veiculo else 'Novo' }} Veículo
</h4>

<div class="card">
    <div class="card-body p-4" style="max-width: 500px">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Placa</label>
                <input type="text" name="placa" class="form-control"
                       value="{{ veiculo[1] if veiculo else '' }}"
                       placeholder="Ex: ABC-1234" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Modelo</label>
                <input type="text" name="modelo" class="form-control"
                       value="{{ veiculo[2] if veiculo else '' }}"
                       placeholder="Ex: Fiat Uno">
            </div>
            <div class="mb-3">
                <label class="form-label">Cor</label>
                <input type="text" name="cor" class="form-control"
                       value="{{ veiculo[3] if veiculo else '' }}"
                       placeholder="Ex: Prata">
            </div>
            <div class="mb-3">
                <label class="form-label">Morador</label>
                <select name="morador_id" class="form-select" required>
                    <option value="">Selecione um morador</option>
                    {% for m in moradores %}
                    <option value="{{ m[0] }}" {{ 'selected' if veiculo and veiculo[4] == m[0] else '' }}>
                        {{ m[1] }} — {{ m[3] }} / AP {{ m[2] }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-4">
                <label class="form-label">Vaga</label>
                <select name="vaga_id" class="form-select">
                    <option value="">Sem vaga</option>
                    {% for vg in vagas %}
                    <option value="{{ vg[0] }}" {{ 'selected' if veiculo and veiculo[5] == vg[0] else '' }}>
                        Vaga {{ vg[1] }} ({{ vg[2] }})
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-verde">Salvar</button>
                <a href="/veiculos" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
