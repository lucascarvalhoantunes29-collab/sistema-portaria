{% extends 'base.html' %}
{% block conteudo %}
<h4 class="fw-bold mb-4" style="color: var(--verde-escuro)">🅿️ Nova Vaga</h4>

<div class="card">
    <div class="card-body p-4" style="max-width: 400px">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Número da Vaga</label>
                <input type="text" name="numero" class="form-control"
                       placeholder="Ex: 01, 02..." required>
            </div>
            <div class="mb-4">
                <label class="form-label">Tipo</label>
                <select name="tipo" class="form-select">
                    <option value="Carro">Carro</option>
                    <option value="Moto">Moto</option>
                </select>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-verde">Salvar</button>
                <a href="/vagas" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
