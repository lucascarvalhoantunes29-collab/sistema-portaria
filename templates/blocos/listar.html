{% extends 'base.html' %}
{% block conteudo %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold" style="color: var(--verde-escuro)">🏗️ Blocos</h4>
    <a href="/blocos/novo" class="btn btn-verde"><i class="bi bi-plus-lg me-1"></i> Novo Bloco</a>
</div>

<div class="mb-3">
    <div class="input-group">
        <span class="input-group-text" style="background: rgba(255,255,255,0.6); border: 1px solid rgba(31,77,53,0.2); border-right: none;">
            <i class="bi bi-search" style="color: var(--verde-medio)"></i>
        </span>
        <input type="text" id="campoPesquisa" class="form-control"
               placeholder="Pesquisar por nome..."
               style="border-left: none; background: rgba(255,255,255,0.6);">
    </div>
</div>

<div class="card">
    <div class="card-header-verde">Lista de Blocos</div>
    <div class="card-body p-0" style="max-height: 600px; overflow-y: auto;">
        <table class="table mb-0" id="tabelaBlocos">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for bloco in blocos %}
                <tr>
                    <td>{{ bloco[1] }}</td>
                    <td>
                        <a href="/blocos/editar/{{ bloco[0] }}" class="btn btn-sm btn-warning">Editar</a>
                        <a href="/blocos/excluir/{{ bloco[0] }}" class="btn btn-sm btn-danger"
                           onclick="return confirm('Excluir este bloco?')">Excluir</a>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="2" class="text-center py-4 text-muted">Nenhum bloco cadastrado.</td></tr>
                {% endfor %}
            </tbody>
        </table>
        <div id="semResultados" class="text-center py-4 text-muted d-none">Nenhum bloco encontrado.</div>
    </div>
</div>

<script>
const campo = document.getElementById('campoPesquisa');
const linhas = document.querySelectorAll('#tabelaBlocos tbody tr');
const semResultados = document.getElementById('semResultados');
let timeout;
campo.addEventListener('input', function () {
    clearTimeout(timeout);
    timeout = setTimeout(() => {
        const termo = campo.value.toLowerCase();
        let visiveis = 0;
        linhas.forEach(row => {
            const visivel = row.textContent.toLowerCase().includes(termo);
            row.style.display = visivel ? '' : 'none';
            if (visivel) visiveis++;
        });
        semResultados.classList.toggle('d-none', visiveis > 0);
    }, 150);
});
</script>
{% endblock %}
